<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jennifer Lopez AI Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #07080d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Inter', sans-serif;
  }

  .container {
    max-width: 860px;
    width: 100%;
    background: #0a0b0f;
    border: 1px solid #1e1f2a;
    border-radius: 24px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,175,55,0.06);
    overflow: hidden;
  }

  /* Hero header */
  .hero {
    background: linear-gradient(160deg, #12101a 0%, #0e0c16 60%, #0a0b0f 100%);
    padding: 40px 40px 32px;
    text-align: center;
    border-bottom: 1px solid #1a1b24;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 420px; height: 220px;
    background: radial-gradient(ellipse, rgba(212,175,55,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c9a227;
    font-weight: 500;
    margin-bottom: 12px;
    opacity: 0.9;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 700;
    color: #f5f0e8;
    letter-spacing: 0.5px;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .hero h1 span { color: #d4af37; }
  .hero p {
    font-size: 14px;
    color: #7a7a8c;
    font-weight: 300;
    letter-spacing: 0.2px;
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(212,175,55,0.1);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11.5px;
    color: #d4af37;
    font-weight: 500;
    margin-bottom: 18px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #d4af37;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* Chat area */
  .chat-area {
    padding: 0 28px 28px;
    background: #0a0b0f;
  }

  #messages {
    height: 360px;
    overflow-y: auto;
    padding: 24px 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #2a2c3a; border-radius: 4px; }

  .msg-wrap { display: flex; flex-direction: column; }
  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.assistant { align-items: flex-start; }

  .msg-name {
    font-size: 10.5px;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    font-weight: 500;
    text-transform: uppercase;
  }
  .msg-wrap.assistant .msg-name { color: #c9a227; padding-left: 4px; }
  .msg-wrap.user .msg-name { color: #555670; padding-right: 4px; }

  .msg-bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    animation: fadeUp 0.22s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-wrap.assistant .msg-bubble {
    background: #13141d;
    color: #dddde8;
    border: 1px solid #1e2030;
    border-bottom-left-radius: 4px;
  }
  .msg-wrap.user .msg-bubble {
    background: linear-gradient(135deg, #b8922a, #d4af37);
    color: #0a0b0f;
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .typing-bubble {
    background: #13141d;
    border: 1px solid #1e2030;
    padding: 14px 18px;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: flex; gap: 5px; align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px;
    background: #4a4a60;
    border-radius: 50%;
    animation: bounce 1.3s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); background: #4a4a60; }
    30% { transform: translateY(-5px); background: #c9a227; }
  }

  /* Suggested questions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 4px 16px;
  }
  .suggestion-chip {
    background: #111220;
    border: 1px solid #252638;
    color: #9090a8;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12.5px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .suggestion-chip:hover {
    border-color: #d4af37;
    color: #d4af37;
    background: rgba(212,175,55,0.06);
  }

  /* Input */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #111220;
    border: 1px solid #1e2030;
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: rgba(212,175,55,0.4); }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: #e0e0ec;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }
  #msg-input::placeholder { color: #3e3e54; }

  #send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #b8922a, #d4af37);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  #send-btn:hover { opacity: 0.88; transform: scale(1.04); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 16px; height: 16px; fill: #0a0b0f; }

  .footer-note {
    text-align: center;
    margin-top: 14px;
    font-size: 11.5px;
    color: #2e2e42;
  }
  .footer-note span { color: #4a4a60; }
</style>
</head>
<body>
<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="live-badge"><span class="live-dot"></span> AI Online</div>
    <div class="hero-label">Official Fan Assistant</div>
    <h1>Jennifer <span>Lopez</span></h1>
    <p>Ask me anything about JLo — music, movies, life, and more.</p>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div id="messages"></div>

    <!-- Suggestion chips -->
    <div class="suggestions" id="suggestions">
      <button class="suggestion-chip" onclick="askSuggestion(this)">🎵 Latest albums</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">🎬 Best movies</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">💃 Her dancing career</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">🌟 Early life & rise to fame</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">💍 Relationships & family</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">🏆 Awards & achievements</button>
      <button class="suggestion-chip" onclick="askSuggestion(this)">📩 Contact support team</button>
    </div>

    <div class="input-row">
      <textarea id="msg-input" rows="1" placeholder="Ask about Jennifer Lopez…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="footer-note">Powered by <span>Claude AI</span> · For fans, by AI</div>
  </div>
</div>

<script>
  const SYSTEM_PROMPT = `You are an enthusiastic, knowledgeable AI assistant dedicated entirely to Jennifer Lopez (JLo). You know everything about her: her music discography, movies, television work, dance career, fashion lines, personal life, relationships, humanitarian work, and cultural impact. You are warm, engaging, and speak with genuine admiration for JLo.

Guidelines:
- Only answer questions related to Jennifer Lopez. For anything unrelated, warmly redirect: "I'm here just for JLo questions — ask me anything about her!"
- Keep answers concise but rich — 2–4 short paragraphs max.
- Use a conversational, fan-friendly tone. Occasional emojis are welcome.
- Always be accurate. If unsure about very recent events, say so honestly.
- Celebrate her achievements and legacy enthusiastically.

Contact & Support:
- If a fan asks to contact the support team, reach a real person, send a message, get in touch, or asks for contact details, provide BOTH options:
  📧 Email: Jenniferlopezoficialteam@gmail.com
  💬 WhatsApp: +1 (206) 387-1576
- Present them in a warm, helpful way like: "You can reach the official support team via email at Jenniferlopezoficialteam@gmail.com or on WhatsApp at +1 (206) 387-1576 — they'll be happy to help! 💛"
- Always offer both options together when contact is requested.`;

  let conversationHistory = [];
  let isLoading = false;

  // Initial greeting
  window.onload = () => {
    addMessage('assistant', "Hola! 👋 I'm your Jennifer Lopez AI assistant. Ask me anything about JLo — her music, movies, iconic looks, personal journey, or legendary career. Need to reach the team directly? Just ask! I'm here for it all! ✨");
  };

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = role === 'assistant' ? 'JLo AI' : 'You';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrap.appendChild(name);
    wrap.appendChild(bubble);
    document.getElementById('messages').appendChild(wrap);
    scrollBottom();
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap assistant';
    wrap.id = 'typing-wrap';
    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = 'JLo AI';
    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(name);
    wrap.appendChild(bubble);
    document.getElementById('messages').appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-wrap');
    if (el) el.remove();
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  async function sendMessage(text) {
    const input = document.getElementById('msg-input');
    const userText = text || input.value.trim();
    if (!userText || isLoading) return;

    // Hide suggestions after first message
    document.getElementById('suggestions').style.display = 'none';

    input.value = '';
    input.style.height = 'auto';
    addMessage('user', userText);
    conversationHistory.push({ role: 'user', content: userText });

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      const reply = data.content?.map(b => b.text || '').join('') || "I'm having a moment — try again! 💫";
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);

    } catch (err) {
      removeTyping();
      addMessage('assistant', "Oops, something went wrong. Please try again in a moment! 💫");
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }

  function askSuggestion(btn) {
    const text = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
    sendMessage(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
</body>
</html>
